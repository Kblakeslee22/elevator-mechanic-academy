<!DOCTYPE html>

  <title>EMA Interactive Labs</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;

    header {
      padding: 48px 24px;
      text-align: center;
      background: #18232e;

  <main>

      <h2>Hydraulic Force Lab</h2>

      <p>

      <a href="labs/hydraulic-force.html">
